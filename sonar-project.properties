# Claves de identificación en SonarCloud
# Asegúrate de que estos valores coincidan exactamente con tu proyecto en SonarCloud
sonar.organization=choclicode
sonar.projectKey=chocliCode_Nexus
sonar.projectName=Nexus

# Carpetas base donde SonarCloud buscará el código fuente
sonar.sources=frontend/src,backend/src

# Carpetas y archivos a excluir del análisis principal (no son código productivo)
sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/tests/**,**/TAREA PRUEBAS/**

# Configuraciones para TypeScript/JavaScript
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
sonar.sourceEncoding=UTF-8
