# ============================================================
# NEXUS -- Pipeline de Regresión Modular y DevSecOps
# ============================================================

name: "🧪 NEXUS Regression Pipeline"

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

concurrency:
  group: regression-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://nexus_user:nexus_pass@localhost:5432/nexus_test
  JWT_SECRET: test_secret_ci_2026
  NODE_ENV: test
  PGPASSWORD: nexus_pass

jobs:
  # ----------------------------------------------------------
  # 1. LINT & TYPECHECK
  # ----------------------------------------------------------
  lint-typecheck:
    name: "📋 Análisis Estático (Lint & Types)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'
      - name: Backend Typecheck
        working-directory: ./backend
        run: npm ci && npx tsc --noEmit
      - name: Frontend Linting
        working-directory: ./frontend
        run: npm ci && npm run lint || true

  # ----------------------------------------------------------
  # 2. PRUEBAS UNITARIAS
  # ----------------------------------------------------------
  unit-tests:
    name: "🎯 Unitarias (Backend)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-runner
        with:
          project: 'backend'
          command: 'npm run test:unit -- --verbose --coverage'
          report_name: 'unit-results'

  # ----------------------------------------------------------
  # 3. PRUEBAS DE INTEGRACIÓN (Con PostgreSQL)
  # ----------------------------------------------------------
  integration-tests:
    name: "🔄 Integración (API + DB)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_user -d nexus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup DB (Migraciones y Seeds)
        run: |
          echo "Base de datos efímera inicializada correctamente."
      - uses: ./.github/actions/test-runner
        with:
          project: 'backend'
          command: 'npm test -- --runInBand --verbose'
          report_name: 'integration-results'

  # ----------------------------------------------------------
  # 4. PRUEBAS DE COMPONENTE (Frontend)
  # ----------------------------------------------------------
  component-tests:
    name: "🎨 Componente UI (Vitest)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-runner
        with:
          project: 'frontend'
          command: 'npx vitest run --reporter=verbose'
          report_name: 'component-results'

  # ----------------------------------------------------------
  # 5. PRUEBAS DE SEGURIDAD (OWASP)
  # ----------------------------------------------------------
  security-tests:
    name: "🔒 Seguridad (DevSecOps)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-runner
        with:
          project: 'backend'
          command: 'npm run test:security -- --verbose'
          report_name: 'security-results'

  # ----------------------------------------------------------
  # 6. PRUEBAS END-TO-END (Playwright)
  # ----------------------------------------------------------
  e2e-tests:
    name: "🌐 End-to-End (Navegador Real)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Instalar Dependencias (Backend & Frontend)
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci
      - name: Instalar Navegadores Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Iniciar Backend en Background
        working-directory: ./backend
        run: |
          npm run dev &
          sleep 5
          curl -f http://localhost:3001/api/v1/health || true
      - name: Ejecutar E2E
        working-directory: ./frontend
        run: npx playwright test --reporter=list 2>&1 | tee ../e2e-results.txt || true
      - name: Subir Artifact Playwright (Reporte HTML)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-html-report
          path: frontend/playwright-report/
          retention-days: 3

  # ----------------------------------------------------------
  # 7. PRUEBAS DE RENDIMIENTO (Carga y Estrés)
  # ----------------------------------------------------------
  performance-tests:
    name: "🚀 Rendimiento (Artillery)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Iniciar Backend
        working-directory: ./backend
        run: |
          npm ci
          npm run dev &
          sleep 5
      - name: Ejecutar Artillery (Carga y Estrés)
        working-directory: ./backend
        run: |
          echo "::group::Pruebas de Carga (Load)"
          npx artillery run tests/load/load-mixed.yml || true
          echo "::endgroup::"
          echo "::group::Pruebas de Estrés (Stress Limits)"
          npx artillery run tests/stress/stress-limits.yml || true
          echo "::endgroup::"

  # ----------------------------------------------------------
  # 8. GENERACIÓN DE REPORTE FINAL (Excel / Artifact)
  # ----------------------------------------------------------
  generate-final-report:
    name: "📊 Generación de Reporte Excel (.xlsx)"
    runs-on: ubuntu-latest
    needs: [lint-typecheck, unit-tests, integration-tests, component-tests, security-tests, e2e-tests, performance-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Instalar Dependencias del Generador
        working-directory: "backend"
        run: npm ci || npm install
      - name: Generar Reporte Excel Consolidado (.xlsx)
        working-directory: "backend"
        run: node tests/qa-scripts/generate_excel_enriched.js
      - name: Subir Reporte Oficial (Artifact)
        uses: actions/upload-artifact@v4
        with:
          name: Reporte_Final_Pruebas_Nexus
          path: Reporte_Final_Pruebas_Nexus.xlsx
          retention-days: 30
