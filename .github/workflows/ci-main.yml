name: "🚀 NEXUS CI (Main) - Release Validation"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-main-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://nexus_user:nexus_pass@localhost:5432/nexus_test
  JWT_SECRET: test_secret_ci_2026
  NODE_ENV: test
  PGPASSWORD: nexus_pass

jobs:
  main-pipeline:
    name: "🚀 QA Pipeline (Main)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_user -d nexus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "🔽 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: "📦 Instalar Dependencias (Backend y Frontend)"
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: "🔄 Pruebas de Integración (API + DB)"
        working-directory: ./backend
        run: |
          echo "Base de datos efímera inicializada."
          npm test -- --runInBand --verbose || true

      - name: "🔒 Pruebas de Seguridad (DevSecOps)"
        working-directory: ./backend
        run: npm run test:security -- --verbose || true

      - name: "🌐 Pruebas End-to-End (Playwright)"
        run: |
          cd frontend
          npx playwright install --with-deps chromium
          cd ../backend
          npm run dev &
          sleep 5
          cd ../frontend
          npx playwright test --reporter=list || true
          pkill -f "npm run dev" || true

      - name: "🚀 Pruebas de Rendimiento (Artillery)"
        run: |
          cd backend
          npm run dev &
          sleep 5
          echo "::group::Pruebas de Carga"
          npx artillery run tests/load/load-mixed.yml || true
          echo "::endgroup::"
          echo "::group::Pruebas de Estrés"
          npx artillery run tests/stress/stress-limits.yml || true
          echo "::endgroup::"
          pkill -f "npm run dev" || true

      - name: "📊 Generación de Reporte Excel"
        if: always()
        working-directory: ./backend
        run: |
          node tests/qa-scripts/generate_excel.js || true
          mv Reporte_Final_Pruebas_Nexus.xlsx Reporte_Pruebas_Main.xlsx

      - name: "📤 Subir Reporte Oficial"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Reporte_Pruebas_Main
          path: backend/Reporte_Pruebas_Main.xlsx
          retention-days: 2
