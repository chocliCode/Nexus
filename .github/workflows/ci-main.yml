name: "🚀 NEXUS CI (Main) - Release Validation"

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-main-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://nexus_user:nexus_pass@localhost:5432/nexus_test
  JWT_SECRET: test_secret_ci_2026
  NODE_ENV: test
  PGPASSWORD: nexus_pass

jobs:
  integration-tests:
    name: "🔄 Integración (API + DB)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_user -d nexus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - name: Setup DB
        run: echo "Base de datos efímera inicializada correctamente."
      - uses: ./.github/actions/test-runner
        with:
          project: 'backend'
          command: 'npm test -- --runInBand --verbose'
          report_name: 'integration-results'

  security-tests:
    name: "🔒 Seguridad (DevSecOps)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/test-runner
        with:
          project: 'backend'
          command: 'npm run test:security -- --verbose'
          report_name: 'security-results'

  e2e-tests:
    name: "🌐 End-to-End (Playwright)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Instalar Dependencias
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci
      - name: Instalar Playwright
        working-directory: ./frontend
        run: npx playwright install --with-deps chromium
      - name: Iniciar Backend
        working-directory: ./backend
        run: |
          npm run dev &
          sleep 5
          curl -f http://localhost:3001/api/v1/health || true
      - name: Ejecutar E2E
        working-directory: ./frontend
        run: npx playwright test --reporter=list || true

  performance-tests:
    name: "🚀 Rendimiento (Artillery)"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Iniciar Backend
        working-directory: ./backend
        run: |
          npm ci
          npm run dev &
          sleep 5
      - name: Ejecutar Pruebas
        working-directory: ./backend
        run: |
          npx artillery run tests/load/load-mixed.yml || true
          npx artillery run tests/stress/stress-limits.yml || true

  generate-report-main:
    name: "📊 Generación de Reporte Excel"
    runs-on: ubuntu-latest
    needs: [integration-tests, security-tests, e2e-tests, performance-tests]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Instalar Dependencias
        working-directory: "backend"
        run: npm ci || npm install
      - name: Generar Reporte Excel
        working-directory: "backend"
        run: node tests/qa-scripts/generate_excel.js
      - name: Renombrar archivo para Main
        run: mv Reporte_Final_Pruebas_Nexus.xlsx Reporte_Pruebas_Main.xlsx
      - name: Subir Reporte Oficial
        uses: actions/upload-artifact@v4
        with:
          name: Reporte_Pruebas_Main
          path: Reporte_Pruebas_Main.xlsx
          retention-days: 2
