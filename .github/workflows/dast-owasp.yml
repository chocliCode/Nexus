name: "🕷️ OWASP ZAP DAST Scan"

# ═══════════════════════════════════════════════════════════════
# DAST: Analisis Dinamico de Seguridad contra la API corriendo
# Se ejecuta SOLO en PRs a main + push a main + semanal
# Levanta el backend real y lo escanea con OWASP ZAP
# ═══════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 0 * * 0'

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://nexus_user:nexus_pass@localhost:5432/nexus_test
  JWT_SECRET: test_secret_ci_2026
  NODE_ENV: test
  PGPASSWORD: nexus_pass

jobs:
  zap_scan:
    name: "🕷️ DAST — OWASP ZAP Scan"
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: read
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: nexus_user
          POSTGRES_PASSWORD: nexus_pass
          POSTGRES_DB: nexus_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U nexus_user -d nexus_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: "🔽 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "⚙️ Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: "📦 Instalar dependencias"
        working-directory: ./backend
        run: npm ci

      - name: "🚀 Levantar Backend"
        working-directory: ./backend
        run: |
          npm run dev &
          sleep 10
          curl -f http://localhost:3001/api/v1/health || true

      - name: "🕷️ Escaneo DAST (OWASP ZAP)"
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: 'http://localhost:3001'
          fail_action: false
          artifact_name: 'ZAP_DAST_Report'
