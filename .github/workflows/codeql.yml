name: "🔐 CodeQL SAST Analysis"

# ═══════════════════════════════════════════════════════════════
# SAST: Analisis Estatico de Seguridad del codigo fuente
# Se ejecuta en PRs a develop Y main + push a main + semanal
# Detecta vulnerabilidades en el codigo sin ejecutarlo
# ═══════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [develop, main]
  schedule:
    # Todos los domingos a medianoche (UTC)
    - cron: '0 0 * * 0'

jobs:
  analyze:
    name: "🔐 SAST — Analizar vulnerabilidades"
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: ['javascript-typescript']

    steps:
      - name: "🔽 Checkout del codigo"
        uses: actions/checkout@v4

      - name: "🔧 Inicializar CodeQL"
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          # security-extended incluye OWASP Top 10 de alta severidad
          # security-and-quality agrega reglas de calidad de codigo
          queries: security-extended,security-and-quality

      - name: "🔍 Ejecutar Analisis SAST"
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"
