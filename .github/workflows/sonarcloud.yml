name: "📊 SonarCloud Quality Analysis"

# ═══════════════════════════════════════════════════════════════
# SCA: Analisis de Calidad de Codigo
# Se ejecuta en PRs a main + push a main
# Reporta code smells, bugs, vulnerabilidades y cobertura
# ═══════════════════════════════════════════════════════════════

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  sonarcloud:
    name: "📊 SCA — SonarCloud Scan"
    runs-on: ubuntu-latest
    steps:
      - name: "🔽 Checkout del codigo"
        uses: actions/checkout@v4
        with:
          # Fetch depth 0 es obligatorio para analisis preciso
          fetch-depth: 0

      - name: "Setup Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: "📦 Instalar y testear Backend"
        working-directory: ./backend
        run: |
          npm ci
          npm run test:unit -- --coverage

      - name: "📦 Instalar y testear Frontend"
        working-directory: ./frontend
        run: |
          npm ci
          npm test -- --coverage --watchAll=false

      - name: "🔍 Escaneo SonarCloud"
        uses: SonarSource/sonarqube-scan-action@v6.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
