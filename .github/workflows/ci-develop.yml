name: "🚀 NEXUS CI (Develop) - Shift-Left"

on:
  push:
    branches: [develop]
  pull_request:
    branches: [develop]

concurrency:
  group: ci-develop-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JWT_SECRET: test_secret_ci_2026
  NODE_ENV: test

jobs:
  develop-pipeline:
    name: "🧪 QA Pipeline (Develop)"
    runs-on: ubuntu-latest
    steps:
      - name: "🔽 Checkout del código"
        uses: actions/checkout@v4

      - name: "⚙️ Configurar Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: "📦 Instalar Dependencias (Backend y Frontend)"
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: "📋 Análisis Estático (Lint & Types)"
        run: |
          echo "::group::Backend Typecheck"
          cd backend && npx tsc --noEmit
          echo "::endgroup::"
          echo "::group::Frontend Linting"
          cd ../frontend && npm run lint || true
          echo "::endgroup::"

      - name: "🎯 Pruebas Unitarias (Backend)"
        working-directory: ./backend
        run: npm run test:unit -- --verbose || true

      - name: "🎨 Pruebas de Componente UI (Frontend)"
        working-directory: ./frontend
        run: npx vitest run --reporter=verbose || true

      - name: "📊 Generación de Reporte Excel"
        if: always()
        working-directory: ./backend
        run: |
          node tests/qa-scripts/generate_excel.js || true
          mv Reporte_Final_Pruebas_Nexus.xlsx Reporte_Pruebas_Develop.xlsx

      - name: "📤 Subir Reporte Oficial"
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Reporte_Pruebas_Develop
          path: backend/Reporte_Pruebas_Develop.xlsx
          retention-days: 2
