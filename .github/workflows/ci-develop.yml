name: "🧪 NEXUS CI — Develop (Shift-Left)"

# ═══════════════════════════════════════════════════════════════
# GATE 1: Validacion rapida antes de llegar a develop
# Se ejecuta en PRs de feature/* hacia develop
# NO requiere base de datos — feedback en < 2 minutos
# ═══════════════════════════════════════════════════════════════

on:
  pull_request:
    branches: [develop]

concurrency:
  group: ci-develop-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  JWT_SECRET: test_secret_ci_2026
  NODE_ENV: test

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Analisis Estatico (Lint + TypeScript)
  # ─────────────────────────────────────────────────────────────
  lint-and-types:
    name: "📋 Lint & TypeScript"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: '**/package-lock.json'

      - name: "📦 Instalar dependencias"
        run: |
          cd backend && npm ci
          cd ../frontend && npm ci

      - name: "🔍 Backend — TypeScript typecheck"
        working-directory: ./backend
        run: npx tsc --noEmit

      - name: "🔍 Frontend — ESLint"
        working-directory: ./frontend
        run: npm run lint

  # ─────────────────────────────────────────────────────────────
  # Job 2: Pruebas Unitarias Backend (160 tests, sin DB)
  # ─────────────────────────────────────────────────────────────
  unit-tests:
    name: "🎯 Unitarias Backend (160)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: "📦 Instalar dependencias"
        working-directory: ./backend
        run: npm ci

      - name: "🧪 Ejecutar pruebas unitarias"
        working-directory: ./backend
        run: npm run test:unit -- --verbose

  # ─────────────────────────────────────────────────────────────
  # Job 3: Pruebas de Componente UI Frontend (45 tests, sin DB)
  # ─────────────────────────────────────────────────────────────
  component-tests:
    name: "🎨 Componente UI (45)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: "📦 Instalar dependencias"
        working-directory: ./frontend
        run: npm ci

      - name: "🧪 Ejecutar pruebas de componente"
        working-directory: ./frontend
        run: npx vitest run --reporter=verbose

  # ─────────────────────────────────────────────────────────────
  # Job 4: Pruebas de Seguridad OWASP (45 tests, sin DB)
  # ─────────────────────────────────────────────────────────────
  security-tests:
    name: "🔒 Seguridad OWASP (45)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: "📦 Instalar dependencias"
        working-directory: ./backend
        run: npm ci

      - name: "🧪 Ejecutar pruebas de seguridad"
        working-directory: ./backend
        run: npm run test:security -- --verbose

  # ─────────────────────────────────────────────────────────────
  # Job 5: Pruebas de Humo (45 tests, sin DB)
  # ─────────────────────────────────────────────────────────────
  smoke-tests:
    name: "💨 Humo / Smoke (45)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'

      - name: "📦 Instalar dependencias"
        working-directory: ./backend
        run: npm ci

      - name: "🧪 Ejecutar pruebas de humo"
        working-directory: ./backend
        run: npm run test:smoke -- --verbose

  # ─────────────────────────────────────────────────────────────
  # Job 6: Reporte de Regresion (resumen del gate)
  # ─────────────────────────────────────────────────────────────
  develop-gate-summary:
    name: "📊 Develop Gate — Resumen"
    runs-on: ubuntu-latest
    needs: [lint-and-types, unit-tests, component-tests, security-tests, smoke-tests]
    if: always()
    steps:
      - name: "📋 Evaluar resultados del Gate"
        run: |
          echo "╔══════════════════════════════════════════════════╗"
          echo "║   NEXUS — Develop Gate (Shift-Left) Summary     ║"
          echo "╠══════════════════════════════════════════════════╣"
          echo "║ Lint & Types:      ${{ needs.lint-and-types.result }}"
          echo "║ Unit Tests (160):  ${{ needs.unit-tests.result }}"
          echo "║ Component UI (45): ${{ needs.component-tests.result }}"
          echo "║ Security (45):     ${{ needs.security-tests.result }}"
          echo "║ Smoke (45):        ${{ needs.smoke-tests.result }}"
          echo "╚══════════════════════════════════════════════════╝"

      - name: "🚫 Bloquear si algun job fallo"
        if: |
          needs.lint-and-types.result == 'failure' ||
          needs.unit-tests.result == 'failure' ||
          needs.component-tests.result == 'failure' ||
          needs.security-tests.result == 'failure' ||
          needs.smoke-tests.result == 'failure'
        run: |
          echo "❌ DEVELOP GATE FALLIDO — El PR no puede mergearse."
          exit 1

      - name: "✅ Gate aprobado"
        if: |
          needs.lint-and-types.result == 'success' &&
          needs.unit-tests.result == 'success' &&
          needs.component-tests.result == 'success' &&
          needs.security-tests.result == 'success' &&
          needs.smoke-tests.result == 'success'
        run: |
          echo "✅ DEVELOP GATE APROBADO — El PR puede mergearse a develop."
